<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>更新日誌</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
  <div class="absolute inset-0 -z-10 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900 via-slate-900/95 to-slate-950"></div>
    <div class="pointer-events-none absolute -top-40 left-1/2 h-[60rem] w-[60rem] -translate-x-1/2 rounded-full bg-gradient-to-tr from-emerald-500/10 via-cyan-400/10 to-indigo-500/10 blur-3xl"></div>
  </div>

  <header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/60 backdrop-blur-md">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="text-lg font-semibold text-white hover:text-emerald-400 transition flex items-center gap-2">
        <span>←</span> 修仙小幫手
      </a>
      <div class="flex gap-2 text-xs text-slate-200">
        <span class="px-3 py-1 rounded-full bg-white/5">最後更新: 2026/6/2</span>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-12 flex-grow w-full">
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold text-white mb-3">更新日誌</h2>
    </div>

    <div class="relative border-l border-slate-800 ml-4 md:ml-6 space-y-10">
      
      <div class="relative pl-6 md:pl-8">
        <div class="absolute -left-[6px] top-1.5 h-3 w-3 rounded-full bg-indigo-500 ring-4 ring-indigo-500/20"></div>
        
        <div class="flex flex-col md:flex-row md:items-center gap-2 mb-3">
          <span class="text-lg font-bold text-white">v1.1.0 更新說明</span>
          <span class="w-fit px-2 py-0.5 text-xs font-medium rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">2026-06-02</span>
        </div>
        <div class="bg-slate-900/50 border border-white/5 rounded-xl p-5 backdrop-blur-sm">
          <ul class="list-disc list-inside space-y-2 text-sm text-slate-300">
            <li><strong class="text-indigo-400">更新</strong> 戰力計算 v2.1.0，可計算 仙/魔 陣營 可攻擊最大戰力</li>
            <li><strong class="text-indigo-400">更新</strong> 結晶計算 新增 18等前期/中期/後期 可計算儲存結晶時間</li>
          </ul>
        </div>
      </div>

    </div>

    <div class="mt-12 text-center">
      <a href="index.html" class="inline-block px-6 py-2.5 rounded-xl bg-slate-900 border border-white/10 text-sm font-medium hover:bg-slate-800 transition">
        返回主介面
      </a>
    </div>
  </main>


</body>
</html>
